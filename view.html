<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Documentation</title>
    <link rel="icon" href="assets/brand/logo/dp-icon.png" type="image/png">

    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/index.css">
    <link rel="stylesheet" href="assets/css/space-theme.css">
    <link rel="stylesheet" href="assets/css/docs.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div id="stars"></div>

<nav>
    <a href="index.html" class="nav-logo">
        <img src="assets/brand/logo/dp-icon.png" class="icon">
        <img src="assets/brand/logo/dp-text.png" class="wordmark">
    </a>

    <ul class="nav-links">        
        <li><a href="index.html">Docs</a></li>
        <li><a href="projects/index.html">Projects</a></li>
    </ul>

    <div class="nav-right">
        <button class="theme-toggle-btn" id="theme-toggle">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
        <span class="nav-badge">Apps</span>
    </div>
</nav>

<div class="app-layout">

    <!-- LEFT SIDEBAR -->
    <aside class="docs-sidebar">
        <div class="docs-search">
            <input id="docs-search" placeholder="Search docs..." />
            <div id="search-results" class="search-results"></div>
        </div>
        <div id="docs-sidebar-nav"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="docs-content">
        <div id="breadcrumb" class="breadcrumb"></div>
        <div id="doc-content"></div>
        <div id="docs-nav"></div>
    </main>

    <!-- RIGHT TOC -->
    <aside class="docs-toc">
        <div id="toc"></div>
    </aside>

</div>

<footer>
    <div class="footer-logo">
        <img src="assets/brand/logo/dp-icon.png" class="icon">
        <img src="assets/brand/logo/dp-text.png" class="logo-text">
    </div>
    <ul class="footer-nav">
        <li><a href="index.html">Docs</a></li>
    </ul>
    <div class="footer-right">
        &copy; <span id="footer-year"></span> DjangoPlay [djangoplay.org]
    </div>
</footer>

<!-- Scripts -->
<script src="assets/js/theme.js"></script>
<script src="assets/js/space.js"></script>
<script src="assets/js/search.js"></script>
<script src="assets/js/docs-nav.js"></script>
<script src="assets/js/breadcrumb.js"></script>
<script src="assets/js/toc.js"></script>
<script src="assets/js/docs-app.js"></script>
